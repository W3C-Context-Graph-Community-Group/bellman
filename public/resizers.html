<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>W3C Context Graph Community Group | Test</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/resizers.css">
  <link rel="stylesheet" href="/css/left/chat.css">
  <link rel="stylesheet" href="/css/center/log.css">
  <link rel="stylesheet" href="/css/right/bellman.css">
</head>
<body class="resizer-page">
  <header class="top-header">
    <span class="header-title">W3C Context Graph Community Group | Test</span>
    <div class="header-actions">
      <select id="modeSelect" class="header-mode-select">
        <option value="trading">Trading</option>
        <option value="sec">SEC RAG</option>
      </select>
      <a href="/sec" class="header-action header-link" target="_blank">SEC Filings Data</a>
      <button id="docsBtn" class="header-action header-docs-btn">Docs</button>
    </div>
  </header>

  <div class="resizer-container">
    <div class="panel" data-panel="left"></div>
    <div class="resizer" data-resizer="left"></div>
    <div class="panel" data-panel="center"></div>
    <div class="resizer" data-resizer="right"></div>
    <div class="panel" data-panel="right"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script type="module">
    import { ResizerManager } from '/js/resizers/ResizerManager.js';
    import { ChatPanel } from '/js/left/ChatPanel.js';
    import { LogPanel } from '/js/center/LogPanel.js';
    import { BellmanPanel } from '/js/right/BellmanPanel.js';
    import { modalManager } from '/js/ModalManager.js';
    import tradingMode from '/js/modes/trading.js';
    import secMode from '/js/modes/sec.js';

    // DOCS button → ModalManager
    document.getElementById('docsBtn').addEventListener('click', () => {
      modalManager.openMarkdown('/api/docs/null-uncertainty');
    });

    const modes = { trading: tradingMode, sec: secMode };
    const container = document.querySelector('.resizer-container');
    const modeSelect = document.getElementById('modeSelect');
    const leftPanel = document.querySelector('[data-panel="left"]');
    const centerPanel = document.querySelector('[data-panel="center"]');

    new ResizerManager(container);
    const bellmanPanel = new BellmanPanel(document.querySelector('[data-panel="right"]'));

    let chatPanel = new ChatPanel(leftPanel, modes[modeSelect.value]);
    let logPanel = new LogPanel(centerPanel);

    modeSelect.addEventListener('change', () => {
      chatPanel = new ChatPanel(leftPanel, modes[modeSelect.value]);
      logPanel = new LogPanel(centerPanel);
      bellmanPanel.reset();
    });
  </script>
</body>
</html>
