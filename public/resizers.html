<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>W3C Context Graph Community Group | Test</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/resizers.css">
  <link rel="stylesheet" href="/css/left/chat.css">
  <link rel="stylesheet" href="/css/center/log.css">
  <link rel="stylesheet" href="/css/right/bellman.css">
  <link rel="stylesheet" href="/css/meta-analysis.css">
</head>
<body class="resizer-page">
  <header class="top-header">
    <span class="header-title">W3C Context Graph Community Group | Test</span>
    <div class="header-actions">
      <select id="modeSelect" class="header-mode-select">
        <option value="trading">Trading</option>
        <option value="sec">SEC RAG</option>
      </select>
      <a href="/sec" class="header-action header-link" target="_blank">SEC Filings Data</a>
      <button id="intentMapBtn" class="header-action header-docs-btn">Intent Map</button>
      <button id="docsBtn" class="header-action header-docs-btn">Docs</button>
      <button id="metaAnalysisBtn" class="header-action header-docs-btn">Meta-Analysis</button>
      <div id="viewButtonContainer">
        <a href="/services/log/viewer" class="header-action header-link" target="_blank">Log Viewer</a>
        <a href="/interpretation-space/" class="header-action header-link" target="_blank">Interpretation Space</a>
        <a href="/report" class="header-action header-link" target="_blank">Audit Report</a>
      </div>
    </div>
  </header>

  <div class="resizer-container">
    <div class="panel" data-panel="left"></div>
    <div class="resizer" data-resizer="left"></div>
    <div class="panel" data-panel="center"></div>
    <div class="resizer" data-resizer="right"></div>
    <div class="panel" data-panel="right"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script type="module">
    import { ResizerManager } from '/js/resizers/ResizerManager.js';
    import { ChatPanel } from '/js/left/ChatPanel.js';
    import { LogPanel } from '/js/center/LogPanel.js';
    import { BellmanPanel } from '/js/right/BellmanPanel.js';
    import { BellmanClassifier } from '/js/right/BellmanClassifier.js';
    import { modalManager } from '/js/ModalManager.js';
    import { LogCapture } from '/js/LogCapture.js';
    import { MetaAnalysisModal } from '/js/MetaAnalysisModal.js';
    import tradingMode from '/js/modes/trading.js';
    import secMode from '/js/modes/sec.js';

    // Set initial URL to /layer/0 if on root
    if (window.location.pathname === '/') {
      history.replaceState(null, '', '/layer/0');
    }

    // INTENT MAP button → fetch superposition API → ModalManager
    document.getElementById('intentMapBtn').addEventListener('click', async () => {
      const res = await fetch('/api/semantic_superposition');
      const data = await res.json();
      const entries = Object.entries(data.data.semantic_superpositions);

      let html = '<h1>Intent Map</h1>';
      html += '<p style="color:#6b7280;font-size:0.85rem;margin-bottom:1rem">'
            + 'All possible semantic interpretations per field.</p>';
      html += '<table><thead><tr><th>Field</th><th>Interpretations</th></tr></thead><tbody>';
      for (const [field, interps] of entries) {
        html += `<tr><td><strong>${field}</strong></td>`
              + `<td>${interps.join(', ')}</td></tr>`;
      }
      html += '</tbody></table>';
      modalManager.open(html);
    });

    // DOCS button → ModalManager
    document.getElementById('docsBtn').addEventListener('click', () => {
      modalManager.openMarkdown('/api/docs/null-uncertainty');
    });

    const modes = { trading: tradingMode, sec: secMode };
    const container = document.querySelector('.resizer-container');
    const modeSelect = document.getElementById('modeSelect');
    const leftPanel = document.querySelector('[data-panel="left"]');
    const centerPanel = document.querySelector('[data-panel="center"]');

    new ResizerManager(container);
    const bellmanPanel = new BellmanPanel(document.querySelector('[data-panel="right"]'));
    const bellmanClassifier = new BellmanClassifier();

    let chatPanel = new ChatPanel(leftPanel, modes[modeSelect.value]);
    let logPanel = new LogPanel(centerPanel);

    // Transparent pipeline logging (fire-and-forget)
    const logCapture = new LogCapture();

    // Meta-Analysis modal (Layer 5)
    const metaModal = new MetaAnalysisModal(logCapture);
    document.getElementById('metaAnalysisBtn').addEventListener('click', () => {
      metaModal.open();
    });

    modeSelect.addEventListener('change', () => {
      chatPanel = new ChatPanel(leftPanel, modes[modeSelect.value]);
      logPanel = new LogPanel(centerPanel);
      bellmanPanel.reset();
    });
  </script>
</body>
</html>
